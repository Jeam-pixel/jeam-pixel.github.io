<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const isLocal = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
        const src = isLocal
          ? 'http://localhost:8000/p01/IMAGES/ocean.png'
          : './IMAGES/ocean.png';

        const img = document.getElementById('sky-img');
        img.setAttribute('src', src);

        document.querySelector('a-assets').addEventListener('loaded', () => {
          document.getElementById('mySky')
            .setAttribute('material', 'src: #sky-img');
        });
      });
    </script>

    <a-scene>
      <a-assets>
        <img id="sky-img" crossorigin="anonymous">
      </a-assets>

      <a-sky id="mySky" src="#sky-img" position="-2.5 0 -1.5"></a-sky>

      <a-text
        font="kelsonsans"
        value="hello i am under the water"
        width="6"
        position="-2.5 1.5 -2.5"
      ></a-text>
    </a-scene>
  </body>
</html>
