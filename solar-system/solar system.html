<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      // Sun colour cycling
      AFRAME.registerComponent('sun-color-cycle', {
        init: function () {
          this.colors = ['#FDB813', '#FF6600', '#FF0000', '#FFD700', '#FF4500'];
          this.index = 0;
          this.el.setAttribute('material', 'color', this.colors[0]);
        },
        tick: function (time, delta) {
          if (!this.lastSwitch) this.lastSwitch = time;
          if (time - this.lastSwitch > 1500) {
            this.index = (this.index + 1) % this.colors.length;
            this.el.setAttribute('material', 'color', this.colors[this.index]);
            this.lastSwitch = time;
          }
        }
      });

      // Orbit around the sun
      AFRAME.registerComponent('orbit', {
        schema: {
          radius:   { type: 'number', default: 5 },
          speed:    { type: 'number', default: 1 },
          offset:   { type: 'number', default: 0 }
        },
        tick: function (time) {
          const angle = (time * 0.001 * this.data.speed) + this.data.offset;
          const x = Math.cos(angle) * this.data.radius;
          const z = Math.sin(angle) * this.data.radius;
          this.el.setAttribute('position', { x: x, y: 0, z: z });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <!-- Textures from Solar System Scope (free/educational use) -->
        <img id="sun-tex"      src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg/1280px-The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg" crossorigin="anonymous">
        <img id="mercury-tex"  src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Mercury_in_true_color.jpg/1024px-Mercury_in_true_color.jpg" crossorigin="anonymous">
        <img id="venus-tex"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Venus-real_color.jpg/1024px-Venus-real_color.jpg" crossorigin="anonymous">
        <img id="earth-tex"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_Blue_Marble_%28remastered%29.jpg/1024px-The_Blue_Marble_%28remastered%29.jpg" crossorigin="anonymous">
        <img id="mars-tex"     src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/OSIRIS_Mars_true_color.jpg/1024px-OSIRIS_Mars_true_color.jpg" crossorigin="anonymous">
        <img id="stars-tex"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/VAN_GOGH_1889_Starry_Night.jpg/1280px-VAN_GOGH_1889_Starry_Night.jpg" crossorigin="anonymous">
      </a-assets>

      <!-- Starfield sky -->
      <a-sky color="#000010"></a-sky>

      <!-- Lights -->
      <a-light type="ambient" color="#222"></a-light>
      <a-light type="point" color="#FDB813" intensity="2" position="0 0 0"></a-light>

      <!-- Sun -->
      <a-sphere id="sun"
        position="0 0 0"
        radius="1.5"
        src="#sun-tex"
        sun-color-cycle
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
      </a-sphere>

      <!-- Mercury -->
      <a-sphere
        radius="0.15"
        src="#mercury-tex"
        orbit="radius: 3; speed: 1.6; offset: 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-sphere>

      <!-- Venus -->
      <a-sphere
        radius="0.25"
        src="#venus-tex"
        orbit="radius: 4.5; speed: 1.17; offset: 1"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
      </a-sphere>

      <!-- Earth -->
      <a-sphere
        radius="0.28"
        src="#earth-tex"
        orbit="radius: 6; speed: 1.0; offset: 2"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-sphere>

      <!-- Mars -->
      <a-sphere
        radius="0.2"
        src="#mars-tex"
        orbit="radius: 7.5; speed: 0.8; offset: 3"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 7000">
      </a-sphere>

      <!-- Camera with W-A-S-D controls -->
      <a-entity position="0 2 12">
        <a-camera wasd-controls-enabled="true" look-controls>
          <a-cursor></a-cursor>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
